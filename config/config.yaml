app:
  project_name: AI Gesture Control System
  version: 0.1.0

model:
  input_dim: 63
  label_col: gesture_label
  save_path: models/trained_models/best_model.joblib
  metrics_path: models/model_metrics/
  random_state: 42
  confidence_threshold: 0.65
  gesture_cooldown_seconds: 0.5

controls:
  gestures:
    thumbs_up: volume_increase
    thumbs_down: volume_decrease
    fist: mute
    open_palm: play_pause
    victory: next_track
    three_fingers: previous_track
    ok: brightness_increase
    closed_ok: brightness_decrease

auth:
  face_required: true
  face_db: data/face_db/

dataset:
  path: dataset/gesture_landmarks.csv

logging:
  level: INFO
  file: logs/app.log
